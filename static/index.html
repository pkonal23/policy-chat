<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPES AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="magic-glow"></div>

    <header class="minimal-header">
        <div class="logo">UPES</div>
        <div class="status">COE: AI</div>
    </header>

    <main class="chat-viewport" id="chat-box">
        <div class="startup-hero" id="hero">
            <h1 class="magic-text">What are you looking for?</h1>
            <p>Intelligence across all UPES policies.</p>
            <div class="suggestions">
                <button class="sugg-btn" data-q="Can I use supplementary exam if debarred for attendance?">Supplementary
                    vs Attendance</button>
                <button class="sugg-btn"
                    data-q="How are relative grading boundaries determined for large batches?">Relative Grading</button>
                <button class="sugg-btn" data-q="What happens if I fail an elective and substitute it?">Elective
                    Substitution</button>
            </div>
        </div>
        <div class="spacer"></div>
    </main>

    <div class="input-zone">
        <form id="chat-form" class="floating-input">
            <input type="text" id="user-input" placeholder="Ask a question..." autocomplete="off" required>
            <button type="submit" id="send-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
        </form>
        <div class="disclaimer">Powered by UPES Centre of Excellence AI.</div>
    </div>

    <!-- Modal Overlay -->
    <div id="source-modal" class="source-modal-overlay" style="display: none;">
        <div class="source-modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Source Node</h3>
                <button onclick="closeSourceModal()" class="close-btn">&times;</button>
            </div>
            <div class="modal-body" id="modal-text"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
